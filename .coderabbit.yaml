language: "ko-KR"

reviews:
  profile: "chill"
  high_level_summary: true

  auto_review:
    enabled: true

  path_instructions:
    - path: "**"
      instructions: |
        Respond in Korean.

    - path: "**/*.java"
      instructions: |
        Use final for parameters and variables.
        Use record for DTO.
        Avoid using @Data, use @Getter.
        Use positive naming for boolean methods.

    - path: "**/*.sql"
      instructions: |
        Use DATETIME instead of TIMESTAMP.
        Use BIT for boolean type.
